server:
  port: 8080

spring:
  application:
    name: ai-agent-mvp

  datasource:
    url: jdbc:mysql://###:3306/ai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ###
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

langchain4j:
  open-ai:
    api-key: sk-5917c903dcf64160989a444f6fb541ab
    model-name: Qwen3_32B_stable
    base-url: ###

# MCP (Model Context Protocol) 配置
# 支持配置多个 MCP 服务器
mcp:
  enabled: true  # 设置为 true 启用 MCP
  servers:
    - name: mcp  # 服务器名称（用于标识）
      url: https://mcp.run/sse # 远程 MCP 服务器 SSE 端点地址
    # 可以添加更多 MCP 服务器配置：
    # - name: math-server
    #   url: http://localhost:3001/sse
    # - name: file-server
    #   url: http://localhost:3002/sse

logging:
  level:
    com.example.ai: DEBUG
    dev.langchain4j: DEBUG
